<template>
    <div class="threadListWrapper">
        <div class="content">
            <div class="threadFilterSearchMobile mobile-only">
                <div class="sr-only" tabindex="0" aria-live="polite" role="status">
                    <template lwc:if={hasThreads}>
                        <p>
                            Du har {sortedThreads.length} samtaler i listen med dette filteret. {unreadThreadsCount}
                            uleste samtaler
                        </p>
                    </template>
                    <template lwc:if={noTreads}>
                        <p>Ingen samtaler</p>
                    </template>
                </div>
                <c-hot_mobile-thread-list-search onsearchchange={handleSearchChange}></c-hot_mobile-thread-list-search>
                <div class="space"></div>
                <c-hot_mobile-thread-list-filter-buttons
                    onfilterbuttonclick={handleFilterButtonClick}
                ></c-hot_mobile-thread-list-filter-buttons>
            </div>
            <div class="threadList">
                <div class="right">
                    <div class="noThreads">
                        <template lwc:if={noTreads}>
                            <p>Ingen samtaler</p>
                        </template>
                    </div>
                    <template for:each={sortedThreads} for:item="thread">
                        <c-hot_mobile-thread-list-card
                            key={thread.Id}
                            thread={thread}
                            onthreadbuttonclick={goToThread}
                        ></c-hot_mobile-thread-list-card>
                    </template>
                </div>
            </div>
        </div>
    </div>
</template>
